version: "3.9"

services:
  docintel:
    build: .
    ports:
      - "8501:8501"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./data:/app/data            # persistent document storage
      - ./indices:/app/indices      # persist FAISS indices
    restart: unless-stopped
    mem_limit: 4g
